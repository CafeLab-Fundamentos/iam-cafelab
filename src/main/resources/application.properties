spring.application.name=iam-cafelab

# Supabase PostgreSQL Connection
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?pgbouncer=true&sslmode=require}
spring.datasource.username=postgres.tlwapmzamzhlfiiwswvw
spring.datasource.password=CafeLabFundamentos
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase transaction pooler does not support prepared statements
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.jpa.hibernate.naming.physical-strategy=com.acme.iamcafelab.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration Properties
authorization.jwt.secret=local-dev-only-change-me-0123456789abcdef0123456789abcdef
authorization.jwt.expiration.days=7

# Flyway Configuration
spring.flyway.enabled=false

# If you enable Flyway later, use the session/direct connection on port 5432 for migrations.
