spring.datasource.url=jdbc:h2:mem:iam-cafelab-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=com.acme.iamcafelab.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

spring.flyway.enabled=false

documentation.application.description=test
documentation.application.version=test
authorization.jwt.secret=test-only-secret-0123456789abcdef0123456789abcdef
authorization.jwt.expiration.days=7
