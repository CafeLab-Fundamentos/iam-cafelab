# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - cafelab-iam-back

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'microsoft'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: '${{ github.workspace }}/target/*.jar'

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0A4ED8F2671842DDB9DFF6B98DE1EFE5 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D1522AA6145E4A4A8E1D99539854063B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5D0FC5AB5E8B47709315CA310AEE1468 }}

      - name: Configure Azure App Settings
        uses: azure/appservice-settings@v1
        with:
          app-name: 'cafelab-iam-back'
          app-settings-json: |
            [
              { "name": "DB_USERNAME",             "value": "${{ secrets.DB_USERNAME }}",  "slotSetting": false },
              { "name": "DB_PASSWORD",             "value": "${{ secrets.DB_PASSWORD }}",  "slotSetting": false },
              { "name": "WEBSITE_RUN_FROM_PACKAGE","value": "0",                           "slotSetting": false },
              { "name": "JAVA_OPTS",               "value": "-Dserver.port=8080",          "slotSetting": false },
              { "name": "PORT",                    "value": "8080",                        "slotSetting": false }
            ]

      - name: Rename JAR
        run: mv *.jar iam-cafelab-app.jar

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cafelab-iam-back'
          slot-name: 'Production'
          package: '*.jar'
          